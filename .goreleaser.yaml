# .goreleaser.yaml
version: 2

project_name: scrapedoctl

before:
  hooks:
    - go mod tidy

builds:
  - id: default
    binary: scrapedoctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    main: ./cmd/scrapedoctl
    ldflags:
      - -s -w -X github.com/ioplane/scrapedoctl/internal/version.Version={{.Version}}

upx:
  - enabled: true
    compress: best
    ids: [default]

nfpms:
  - id: scrapedoctl
    package_name: scrapedoctl
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    replacements:
      amd64: x86_64
    vendor: ioplane
    maintainer: Pavel Lavrukhin <46395539+dantte-lp@users.noreply.github.com>
    description: Scrape.do CLI & MCP Server
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: scrapedoctl
        dst: /usr/bin/scrapedoctl

archives:
  - format: tar.gz
    # Include standard metadata files
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - SECURITY.md
      - docs/**/*
      - .claude-plugin/plugin.json
    # this name template makes the OS and Arch compatible with the results of uname.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
