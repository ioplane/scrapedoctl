name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: golang:1.26-trixie
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Build
        run: |
          VERSION="ci-${GITHUB_SHA::8}"
          GIT_COMMIT="${GITHUB_SHA::8}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w \
            -X github.com/ioplane/scrapedoctl/internal/version.Version=${VERSION} \
            -X github.com/ioplane/scrapedoctl/internal/version.GitCommit=${GIT_COMMIT} \
            -X github.com/ioplane/scrapedoctl/internal/version.BuildDate=${BUILD_DATE}"
          CGO_ENABLED=0 go build -buildvcs=false -ldflags="${LDFLAGS}" -o scrapedoctl ./cmd/scrapedoctl

      - name: Install test tools
        run: |
          go install gotest.tools/gotestsum@latest

      - name: Test with coverage
        run: |
          gotestsum \
            --junitfile unit-report.xml \
            --format short-verbose \
            -- -buildvcs=false ./... -race -count=1 \
               -coverprofile=coverage.out -covermode=atomic

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            unit-report.xml
            coverage.out
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: golang:1.26-trixie
    steps:
      - uses: actions/checkout@v4

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: golangci-lint v2
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6
          golangci-lint run ./...

  vulnerability-check:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: golang:1.26-trixie
    steps:
      - uses: actions/checkout@v4

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: osv-scanner
        run: |
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@latest
          osv-scanner scan -r .
        continue-on-error: true
