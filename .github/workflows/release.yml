name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  UPX_VERSION: "5.1.1"
  PWSH_VERSION: "7.6.0"

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install UPX from GitHub
        run: |
          curl -fsSL "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz" -o upx.tar.xz
          tar xJf upx.tar.xz
          sudo mv "upx-${UPX_VERSION}-amd64_linux/upx" /usr/local/bin/
          rm -rf upx.tar.xz "upx-${UPX_VERSION}-amd64_linux"
          upx --version | head -1

      - name: Install PowerShell from GitHub
        run: |
          curl -fsSL "https://github.com/PowerShell/PowerShell/releases/download/v${PWSH_VERSION}/powershell-${PWSH_VERSION}-linux-x64.tar.gz" -o pwsh.tar.gz
          sudo mkdir -p /opt/microsoft/powershell/7
          sudo tar xzf pwsh.tar.gz -C /opt/microsoft/powershell/7
          sudo chmod +x /opt/microsoft/powershell/7/pwsh
          sudo ln -sf /opt/microsoft/powershell/7/pwsh /usr/local/bin/pwsh
          rm pwsh.tar.gz
          pwsh --version

      - name: Generate completions
        run: |
          mkdir -p completions
          go run ./cmd/scrapedoctl completion bash > completions/scrapedoctl.bash
          go run ./cmd/scrapedoctl completion zsh > completions/scrapedoctl.zsh
          go run ./cmd/scrapedoctl completion fish > completions/scrapedoctl.fish
          go run ./cmd/scrapedoctl completion powershell > completions/scrapedoctl.psm1
          VERSION="${GITHUB_REF_NAME#v}"
          pwsh -Command "New-ModuleManifest -Path ./completions/scrapedoctl.psd1 -RootModule './scrapedoctl.psm1' -Author 'Pavel Lavrukhin' -CompanyName 'ioplane' -Description 'PowerShell completion for scrapedoctl' -ModuleVersion '${VERSION}' -FunctionsToExport @() -CmdletsToExport @() -VariablesToExport @() -AliasesToExport @()"
          ls -la completions/

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
